<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <main>

        <section>


        </section>

        <section>
            <h1>Login</h1>
            <form action="#" method="post" autocomplete="on">
                <p>
                    <label for="email">E-mail:</label>
                    <input type="email" name="email" id="email" required autocomplete="email">
                </p>
                <p>
                    <label for="password">Senha:</label>
                <input type="password" name="password" id="password" required minlength="6" maxlength="20" autocomplete="current-password">
                </p>
                <input type="submit" value="Entrar">
            </form>
            <a href="index.html">
                <p>Esqueci a senha?</p>
            </a>
        </section>
    </main>
</body>
</html>
