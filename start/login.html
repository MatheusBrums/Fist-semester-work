<!DOCTYPE html>
<html lang="pt-br">

    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <nav>
            <div id="logo">
                <a href="index.html"><img src="images/logos/logo_branco.png" alt="logo_ippas" width="100px"></a>
            </div>
            <div id="nav">

                <ul>

    <main>
    <div class="login-container">
        <h1>Login</h1>

        <form>
            <div class="input-group">
                <label>E-mail:</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Senha:</label>
                <input type="password" required>
            </div>

            <button type="submit">Entrar</button>

            <a href="#">Esqueci a senha?</a>
        </form>
    </div>
</main>
</body>
</html>
