<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <main>
        <section>

        </section>

        <section>
            <h1>Faça seu cadastro</h1>
            <form action="#" method="post" autocomplete="on">
                <p>
                    <label for="name">Nome:</label>
                    <input type="text" name="name" id="name" required autocomplete="name">
                </p>
                <p>
                    <label for="email">E-mail:</label>
                    <input type="email" name="email" id="email" required autocomplete="email">
                </p>
                <p>
                    <label for="password">Senha:</label>
                <input type="password" name="password" id="password" required minlength="6" maxlength="20" autocomplete="new-password">
                </p>
                <p>
                    <label for="tel">Telefone:</label>
                    <input type="tel" name="tel" id="tel" required pattern="(\([0-9]{2}\))([9]{1})?([0-9]{5})([0-9]{4})" placeholder="(99) 999999999" autocomplete="tel">
                </p>
                <p>
                    <label for="Birday">Data de nascimento:</label>
                    <input type="date" name="birday" id="birday" required autocomplete="bday">
                </p>
                <p>
                    <label for="state">Região:</label>
                    <select name="state" id="state">

                        <optgroup label="Região Sul">
                            <option value="PR">Paraná</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="RS">Rio Grande do Sul</option>

                        </optgroup>

                        <optgroup label="Região Sudeste">
                            <option value="ES">Espírito Santo</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="SP">São Paulo</option>

                        </optgroup>

                        <optgroup label="Região Centro-Oeste">
                            <option value="GO">Goiás</option>
                            <option value="MT">Mato Grosso</option>
                            <option value="MS">Mato Grosso do Sul</option>

                        </optgroup>




                    </select>
                </p>
                <p>
                    <label for="masculine">Masculino</label>
                    <input type="radio" name="sex" id="masculine" value="m" required>
                    <label for="feminine">Feminino</label>
                    <input type="radio" name="sex" id="feminine" value="f" required>
                </p>
                
                <input type="submit" value="Cadastrar">


            </form>
            <a href="login.html">
                <p>Já tenho uma conta</p>
            </a>

        </section>


    </main>
</body>
</html>
